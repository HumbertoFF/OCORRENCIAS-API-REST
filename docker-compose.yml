services:

  postgres:
    image: postgres:16-alpine
    container_name: ocorrencias-postgres
    environment:
      POSTGRES_DB: ocorrencias_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: ocorrencias-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # API S3
      - "9001:9001"   # Console web
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
  createbuckets:
    image: minio/mc
    container_name: ocorrencias-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing myminio/ocorrencias;
      mc anonymous set public myminio/ocorrencias;
      exit 0;
      "

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ocorrencias-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

  app:
    build: .
    container_name: ocorrencias-api
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ocorrencias_db
      DB_USER: postgres
      DB_PASS: postgres
      MINIO_ENDPOINT: http://minio:9000
      MINIO_PUBLIC_ENDPOINT: http://localhost:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: ocorrencias
      JWT_SECRET: 3f8a7b2c9d4e1f6a0b5c8d3e7f2a9b4c1d6e0f3a8b7c2d5e9f4a1b6c0d3e7f
      SERVER_PORT: 8080
      APP_BASE_URL: http://localhost:8080
    ports:
      - "8080:8080"
    restart: on-failure

volumes:
  postgres_data:
  minio_data:
